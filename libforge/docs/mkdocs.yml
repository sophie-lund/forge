site_name: Sycamore

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: blue
  features:
    - content.code.copy

extra_css:
  - custom.css

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
  - admonition

watch:
  - ../include

nav:
  - Intro: intro.md
  - Tutorial:
      - Defining a syntax tree: tutorial/defining-a-syntax-tree.md
      - Debug formatting: tutorial/debug-formatting.md
      - Well formed validation: tutorial/well-formed-validation.md
